# SonarCloud project configuration
sonar.projectKey=iKozay_TrackMyDegree
sonar.organization=trackmydegree

# Project metadata
sonar.projectName=TrackMyDegree
sonar.projectVersion=1.0

# Source code directories
sonar.sources=frontend/src,backend/src,backend/python_utils
sonar.tests=frontend/src/tests,backend/src/tests,backend/python_utils/tests

# Test file patterns
sonar.test.inclusions=frontend/src/tests/**/*,backend/src/tests/**/*,backend/python_utils/tests/**/*
# Coverage report paths
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/src/coverage/lcov.info
sonar.javascript.sourceMap.enabled=true
sonar.typescript.tsconfigPaths=backend/src/tsconfig.json
sonar.python.coverage.reportPaths=backend/python_utils/coverage.xml
sonar.python.version=3

# Exclusions
sonar.exclusions=**/*.config.js,**/*.config.ts

# Language-specific settings
sonar.sourceEncoding=UTF-8
