version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - app-network
    env_file:
      - ./secrets/docker.env
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  python-utils:
    build:
      context: ./Back-End/python_utils
      dockerfile: Dockerfile
    container_name: python-utils
    ports:
      - "15001:15001"
    env_file:
      - ./secrets/docker.env
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: ./Back-End/src/Dockerfile.prod
    container_name: backend
    ports:
      - "8000:8000"
    env_file:
      - ./secrets/docker.env
    networks:
      - app-network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      python-utils:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: ./Back-End/src/Dockerfile.prod
    container_name: worker
    env_file:
      - ./secrets/docker.env
    command: ["npm", "run", "worker"]
    networks:
      - app-network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      python-utils:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: ./ts-front-end/Dockerfile.prod
    ports:
      - "4173:4173"
    env_file:
      - ./secrets/docker.env
    networks:
      - app-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  redis-data:
  mongodb-data:
